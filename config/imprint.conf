# ----------------------------------------------------------------
# Final Safe Configuration (June 19, 2025)
# Compatible with your current west.yml manifest
# ----------------------------------------------------------------

#-------------------------------------------------
# Base Configuration
#-------------------------------------------------
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=60000h
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

#-------------------------------------------------
# Bluetooth Performance & Stability
#-------------------------------------------------
# Enables experimental BLE fixes for better stability on certain hosts (e.g., macOS).
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Sets Bluetooth transmit power to the maximum (+8 dBm) for a stronger signal and better range.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Disables a check to work around a Windows bug, improving battery reporting compatibility.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# NOTE: The custom Bluetooth latency and USB polling settings have been removed.
# They are not compatible with your ZMK version + keyboard fork combination.
# The keyboard will use the default latency values.

#-------------------------------------------------
# USB Performance
#-------------------------------------------------
# Enables keyboard to wake host computer from USB suspend
CONFIG_USB_DEVICE_REMOTE_WAKEUP=y

#-------------------------------------------------
# Keystroke Latency
#-------------------------------------------------
# Reduce debounce time for key presses to 1ms for a snappier feel.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
# Debounce for key release.
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

#-------------------------------------------------
# Power Efficiency
#-------------------------------------------------
# Set default underglow brightness to 30% to save power on startup.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=30

#-------------------------------------------------
# Pointing Device Profile: Twitch Reflex
#-------------------------------------------------
# Keeps the sensor highly active for maximum responsiveness.
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=128
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=30000
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=120000
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=50
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=100

#-------------------------------------------------
# Final Build Optimizations
#-------------------------------------------------
# Forces the compiler to optimize for maximum execution speed over smaller file size.
CONFIG_SPEED_OPTIMIZATIONS=y
# Completely disables the logging subsystem to save space and processing time.
CONFIG_ZMK_LOG_LEVEL_OFF=y

#-------------------------------------------------
# Memory and Settings Persistence
#-------------------------------------------------
# Waits 60 seconds before saving settings changes to flash, to reduce wear.
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=60000
# Sets the heap memory pool size to 8KB (default).
CONFIG_HEAP_MEM_POOL_SIZE=8192
# Increases the main thread stack size to 2KB for added stability.
CONFIG_MAIN_STACK_SIZE=2048
